<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gen Cards — Tap. Earn. Redeem.</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--white:#f5f5f3;--muted:#555552;--muted2:#888884;--border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.13);--radius:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Geist',system-ui,sans-serif;font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:2px;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:58px;border-bottom:1px solid var(--border);background:rgba(8,8,8,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
.nav-logo{font-family:'Geist Mono',monospace;font-size:14px;font-weight:500;letter-spacing:0.06em;color:var(--white);text-decoration:none;}
.nav-links{display:flex;gap:28px;align-items:center;}
.nav-links a{font-size:12px;color:var(--muted);text-decoration:none;transition:color 0.2s;letter-spacing:0.02em;}
.nav-links a:hover{color:var(--white);}
.nav-actions{display:flex;gap:10px;align-items:center;}
.btn-n{font-family:'Geist',sans-serif;font-size:12px;font-weight:400;padding:7px 18px;border-radius:7px;cursor:pointer;transition:all 0.2s;border:none;display:inline-flex;align-items:center;gap:6px;outline:none;text-decoration:none;}
.btn-ng{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ng:hover{color:var(--white);border-color:var(--border-h);}
.btn-ns{background:var(--white);color:var(--bg);font-weight:500;}
.btn-ns:hover{background:#e0e0de;}

/* HERO */
.hero{display:flex;align-items:center;padding:90px 40px 52px;position:relative;overflow:hidden;}
.hero-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 60% 50%,black 0%,transparent 70%);pointer-events:none;}
.hero-glow{position:absolute;right:-10%;top:20%;width:600px;height:600px;background:radial-gradient(ellipse,rgba(255,255,255,0.03) 0%,transparent 70%);pointer-events:none;}
.hero-inner{max-width:1200px;margin:0 auto;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;position:relative;z-index:1;}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:0.14em;color:var(--muted2);border:1px solid var(--border);padding:5px 12px;border-radius:100px;margin-bottom:24px;opacity:0;animation:up 0.6s 0.1s forwards;}
.hero-tag .pulse{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80;animation:puls 2s infinite;}
@keyframes puls{0%,100%{opacity:1;}50%{opacity:0.3;}}
h1{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(46px,5.5vw,76px);font-weight:400;line-height:1.02;letter-spacing:-0.02em;color:var(--white);opacity:0;animation:up 0.6s 0.2s forwards;}
h1 em{font-style:italic;color:rgba(245,245,243,0.35);}
.hero-body{margin-top:20px;font-size:15px;line-height:1.7;color:var(--muted2);max-width:440px;opacity:0;animation:up 0.6s 0.35s forwards;}
.hero-ctas{margin-top:32px;display:flex;gap:12px;align-items:center;opacity:0;animation:up 0.6s 0.5s forwards;}
.btn-p{background:var(--white);color:var(--bg);font-family:'Geist',sans-serif;font-size:13px;font-weight:500;padding:11px 24px;border-radius:9px;text-decoration:none;transition:all 0.2s;border:none;cursor:pointer;outline:none;}
.btn-p:hover{background:#e0e0de;transform:translateY(-1px);}
.btn-o{background:transparent;color:var(--muted2);font-family:'Geist',sans-serif;font-size:13px;padding:11px 24px;border-radius:9px;border:1px solid var(--border);text-decoration:none;transition:all 0.2s;cursor:pointer;outline:none;}
.btn-o:hover{color:var(--white);border-color:var(--border-h);}
.hero-stats{margin-top:36px;display:flex;gap:32px;border-top:1px solid var(--border);padding-top:24px;opacity:0;animation:up 0.6s 0.65s forwards;}
.hstat-num{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;color:var(--white);line-height:1;}
.hstat-label{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:0.02em;}

/* 3D CARD */
.card-scene{display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;animation:fadeIn 1s 0.4s forwards;}
.card-wrap{width:340px;height:215px;perspective:900px;cursor:pointer;outline:none;-webkit-tap-highlight-color:transparent;user-select:none;position:relative;z-index:2;}
.card-wrap:focus,.card-wrap *{outline:none;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:cardFloat 5s ease-in-out infinite;transition:transform 0.75s cubic-bezier(0.23,1,0.32,1);will-change:transform;}
.card-inner.flipped{transform:rotateY(180deg) rotateX(3deg)!important;animation-play-state:paused;}
@keyframes cardFloat{0%,100%{transform:rotateY(-5deg) rotateX(5deg) translateY(0);}50%{transform:rotateY(5deg) rotateX(3deg) translateY(-10px);}}
.card-face{position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;}
.card-front{background:#090909;border:1px solid rgba(255,255,255,0.1);box-shadow:0 32px 64px rgba(0,0,0,0.9),inset 0 1px 0 rgba(255,255,255,0.07);}
.card-back{background:#0b0b0b;border:1px solid rgba(255,255,255,0.07);transform:rotateY(180deg);box-shadow:0 32px 64px rgba(0,0,0,0.9);}
.card-front::before,.card-back::before{content:'';position:absolute;inset:0;border-radius:16px;background:radial-gradient(ellipse at 25% 15%,rgba(255,255,255,0.04) 0%,transparent 55%);pointer-events:none;}
.card-front::after{content:'';position:absolute;inset:0;border-radius:16px;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.008) 3px,rgba(255,255,255,0.008) 4px);pointer-events:none;}
.c-loyalty{position:absolute;top:16px;left:18px;font-family:'Geist Mono',monospace;font-size:8px;letter-spacing:0.18em;color:rgba(255,255,255,0.28);text-transform:uppercase;}
.c-chip{position:absolute;top:34px;left:18px;width:38px;height:28px;background:linear-gradient(135deg,#232323,#161616,#232323);border-radius:4px;border:0.5px solid rgba(255,255,255,0.1);display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:3px;padding:5px;}
.c-chip-cell{background:rgba(255,255,255,0.07);border-radius:1px;}
.c-chip-cell.w{grid-column:span 3;}
.c-nfc{position:absolute;top:18px;right:18px;opacity:0.25;}
.c-num{position:absolute;top:50%;left:18px;transform:translateY(-50%);font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:0.22em;color:rgba(255,255,255,0.38);}
.c-stamps{position:absolute;bottom:22px;right:18px;display:flex;gap:5px;align-items:center;}
.c-stamp{width:14px;height:14px;border-radius:50%;border:1px solid rgba(255,255,255,0.18);}
.c-stamp.on{background:rgba(255,255,255,0.85);border-color:transparent;}
.c-brand{position:absolute;bottom:18px;left:18px;font-family:'Geist Mono',monospace;font-size:13px;letter-spacing:0.22em;color:rgba(255,255,255,0.85);}
.c-brand small{display:block;font-size:7px;letter-spacing:0.18em;color:rgba(255,255,255,0.18);margin-top:2px;}
.c-mag{position:absolute;top:28px;left:0;right:0;height:36px;background:rgba(255,255,255,0.04);}
.c-sig{position:absolute;top:84px;left:18px;right:18px;height:28px;background:repeating-linear-gradient(90deg,rgba(255,255,255,0.025) 0,rgba(255,255,255,0.025) 4px,transparent 4px,transparent 8px);border-radius:3px;border:0.5px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 10px;}
.c-sig-text{font-family:'Instrument Serif',serif;font-style:italic;font-size:15px;color:rgba(255,255,255,0.22);}
.c-blogo{position:absolute;top:132px;left:18px;font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:0.2em;color:rgba(255,255,255,0.18);}
.c-binfo{position:absolute;top:132px;right:18px;text-align:right;font-size:8px;letter-spacing:0.1em;color:rgba(255,255,255,0.16);line-height:2;font-family:'Geist Mono',monospace;}
.c-tagline{position:absolute;bottom:18px;left:18px;font-size:8px;letter-spacing:0.22em;color:rgba(255,255,255,0.16);text-transform:uppercase;font-family:'Geist Mono',monospace;}
.c-qr{position:absolute;bottom:12px;right:18px;width:38px;height:38px;border:0.5px solid rgba(255,255,255,0.12);border-radius:3px;padding:3px;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:1.5px;}
.c-qr-cell{border-radius:1px;}.c-qr-cell.on{background:rgba(255,255,255,0.55);}
.card-glow-ring{position:absolute;inset:-30px;border-radius:30px;background:radial-gradient(ellipse at center,rgba(255,255,255,0.04) 0%,transparent 65%);pointer-events:none;z-index:1;}
.card-flip-hint{margin-top:14px;font-size:10px;letter-spacing:0.16em;color:var(--muted);font-family:'Geist Mono',monospace;text-align:center;}

/* TICKER */
.ticker-wrap{border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow:hidden;padding:12px 0;position:relative;}
.ticker-wrap::before,.ticker-wrap::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2;}
.ticker-wrap::before{left:0;background:linear-gradient(to right,var(--bg),transparent);}
.ticker-wrap::after{right:0;background:linear-gradient(to left,var(--bg),transparent);}
.ticker{display:flex;white-space:nowrap;animation:ticker 22s linear infinite;}
.ticker-item{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--muted);padding:0 28px;display:inline-flex;align-items:center;gap:10px;}
.ticker-item span{color:rgba(255,255,255,0.07);}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}

/* SECTIONS */
.sec{padding:64px 40px;}
.sec-inner{max-width:1200px;margin:0 auto;}
.sec-label{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:0.16em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
h2{font-family:'Instrument Serif',serif;font-size:clamp(30px,3.8vw,50px);font-weight:400;line-height:1.06;letter-spacing:-0.02em;color:var(--white);margin-bottom:36px;}
h2 em{font-style:italic;color:rgba(245,245,243,0.3);}

/* COUNTERS */
.counter-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--border);}
.counter-card{background:var(--bg2);padding:28px;border-right:1px solid var(--border);position:relative;overflow:hidden;}
.counter-card:last-child{border-right:none;}
.counter-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,0.08),transparent);}
.counter-num{font-family:'Instrument Serif',serif;font-size:38px;font-weight:400;color:var(--white);line-height:1;}
.counter-label{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:0.03em;}

/* STEPS */
.steps-wrap{position:relative;}
.steps-line{position:absolute;top:5px;left:5px;right:0;height:1px;background:var(--border);}
.steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative;z-index:1;}
.step-card{padding:0 20px 20px 0;transition:all 0.2s;}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--bg3);border:1px solid var(--border-h);margin-bottom:20px;transition:all 0.3s;}
.step-card:hover .step-dot{background:var(--white);border-color:var(--white);}
.step-n{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:0.12em;color:var(--muted);margin-bottom:8px;}
.step-card h3{font-family:'Instrument Serif',serif;font-size:17px;font-weight:400;color:var(--white);margin-bottom:7px;}
.step-card p{font-size:12px;color:var(--muted);line-height:1.65;}

/* TAP DEMO */
.tap-demo{border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);padding:36px;display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:center;}
.tap-visual{display:flex;justify-content:center;align-items:center;position:relative;height:180px;}
.tap-rings{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);}
.tap-ring{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,0.1);transform:translate(-50%,-50%) scale(0);animation:tapRing 2.5s ease-out infinite;}
.tap-ring:nth-child(1){width:110px;height:110px;animation-delay:0s;}
.tap-ring:nth-child(2){width:150px;height:150px;animation-delay:0.55s;}
.tap-ring:nth-child(3){width:190px;height:190px;animation-delay:1.1s;}
@keyframes tapRing{0%{transform:translate(-50%,-50%) scale(0.3);opacity:0.7;}100%{transform:translate(-50%,-50%) scale(1);opacity:0;}}
.tap-phone{width:80px;height:140px;border:1.5px solid rgba(255,255,255,0.13);border-radius:14px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;}
.tap-phone-screen{width:62px;height:114px;border-radius:9px;background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
.tap-status{font-size:7px;color:var(--muted);letter-spacing:0.12em;font-family:'Geist Mono',monospace;}
.tap-count{font-family:'Instrument Serif',serif;font-size:22px;color:var(--white);}
.tap-sub{font-size:7px;color:var(--muted);font-family:'Geist Mono',monospace;letter-spacing:0.08em;}
.tap-info h3{font-family:'Instrument Serif',serif;font-size:24px;font-weight:400;color:var(--white);margin-bottom:10px;}
.tap-info p{font-size:13px;color:var(--muted2);line-height:1.7;margin-bottom:18px;}
.tap-steps{list-style:none;}
.tap-steps li{font-size:12px;color:var(--muted);padding:7px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.tap-steps li:last-child{border-bottom:none;}
.tap-steps li::before{content:'';width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.25);flex-shrink:0;}

/* INDUSTRIES */
.ind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.ind-card{background:var(--bg);padding:26px;transition:background 0.2s;}
.ind-card:hover{background:var(--bg2);}
.ind-icon{font-size:20px;margin-bottom:12px;}
.ind-card h3{font-family:'Instrument Serif',serif;font-size:17px;font-weight:400;color:var(--white);margin-bottom:6px;}
.ind-card p{font-size:12px;color:var(--muted);line-height:1.65;}

/* DASHBOARD */
.dash-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--bg2);}
.dash-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px;}
.dot3{width:8px;height:8px;border-radius:50%;}
.dot3-r{background:#ff5f57;}.dot3-y{background:#febc2e;}.dot3-g{background:#28c840;}
.dash-url{margin-left:8px;background:rgba(255,255,255,0.04);border-radius:5px;padding:3px 12px;font-family:'Geist Mono',monospace;font-size:10px;color:var(--muted);flex:1;max-width:240px;}
.dash-body{display:grid;grid-template-columns:175px 1fr;min-height:320px;}
.dash-side{background:#0a0a0a;border-right:1px solid var(--border);padding:14px 0;}
.dash-nav{padding:9px 16px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px;cursor:default;transition:color 0.2s,background 0.2s;}
.dash-nav:hover,.dash-nav.on{color:var(--white);background:rgba(255,255,255,0.04);}
.dash-main{padding:18px;}
.dash-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.dash-metric{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;}
.dash-metric-label{font-size:9px;color:var(--muted);letter-spacing:0.1em;margin-bottom:4px;}
.dash-metric-val{font-family:'Instrument Serif',serif;font-size:28px;color:var(--white);line-height:1;}
.dash-metric-delta{font-size:10px;color:#4ade80;margin-top:3px;}
.dash-chart{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;}
.dash-chart-title{font-size:9px;color:var(--muted);letter-spacing:0.1em;margin-bottom:12px;}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:65px;}
.cbar{flex:1;border-radius:2px 2px 0 0;background:rgba(255,255,255,0.06);transition:background 0.2s;}
.cbar.hi{background:rgba(255,255,255,0.42);}
.cbar:hover{background:rgba(255,255,255,0.18);}

/* PORTAL */
.portal-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.portal-card{background:var(--bg);padding:36px;display:flex;flex-direction:column;transition:background 0.2s;}
.portal-card:hover{background:var(--bg2);}
.portal-tag{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.portal-card h3{font-family:'Instrument Serif',serif;font-size:24px;font-weight:400;color:var(--white);margin-bottom:8px;}
.portal-card p{font-size:13px;color:var(--muted2);line-height:1.65;margin-bottom:24px;}
.portal-features{list-style:none;margin-bottom:28px;}
.portal-features li{font-size:12px;color:var(--muted);padding:7px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.portal-features li::before{content:'—';color:rgba(255,255,255,0.13);font-size:10px;}
.portal-features li:last-child{border-bottom:none;}
.btn-portal{display:inline-flex;align-items:center;gap:7px;font-family:'Geist',sans-serif;font-size:12px;font-weight:500;padding:10px 20px;border-radius:8px;cursor:pointer;border:none;width:fit-content;outline:none;text-decoration:none;transition:all 0.2s;}
.btn-pw{background:var(--white);color:var(--bg);}
.btn-pw:hover{background:#ddd;}
.btn-pb{background:transparent;color:var(--white);border:1px solid var(--border);}
.btn-pb:hover{border-color:var(--border-h);}

/* SINGLE PLAN */
.plan-wrap{max-width:580px;margin:0 auto;}
.plan-card{background:var(--bg2);border:1px solid var(--border-h);border-radius:16px;padding:44px;position:relative;overflow:hidden;}
.plan-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,0.14),transparent);}
.plan-badge{display:inline-flex;align-items:center;gap:6px;font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--bg);background:var(--white);padding:4px 12px;border-radius:100px;margin-bottom:22px;}
.plan-name{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:0.16em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.plan-amount{font-family:'Instrument Serif',serif;font-size:60px;font-weight:400;color:var(--white);line-height:1;letter-spacing:-0.02em;}
.plan-amount sup{font-size:24px;vertical-align:super;letter-spacing:0;}
.plan-period{font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:6px;}
.plan-note{font-size:12px;color:var(--muted2);margin-bottom:28px;line-height:1.6;}
.plan-divider{border:none;border-top:1px solid var(--border);margin:24px 0;}
.plan-features{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:0;}
.plan-features li{font-size:12px;color:var(--muted2);padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.plan-features li::before{content:'✓';color:rgba(255,255,255,0.4);font-size:10px;}
.plan-features li:nth-last-child(-n+2){border-bottom:none;}
.btn-plan{display:block;width:100%;margin-top:28px;text-align:center;padding:12px;border-radius:9px;font-size:13px;font-weight:500;font-family:'Geist',sans-serif;background:var(--white);color:var(--bg);border:none;cursor:pointer;
